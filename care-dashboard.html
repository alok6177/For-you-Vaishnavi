<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Does She Still Care? — Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--card:#121214;--border:#1c1c20;--text:#ede9e3;--muted:#8a857e;--accent:#c9a87c;--green:#7ac4a0;--red:#c47a7a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:1.5rem}
.wrap{max-width:960px;margin:0 auto}
.header{text-align:center;margin-bottom:2rem}
.header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:400}
.header p{color:var(--muted);font-size:13px;margin-top:6px}
.mono{font-family:'JetBrains Mono',monospace}
.label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}

.score-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;text-align:center;margin-bottom:1.5rem;position:relative;overflow:hidden}
.score-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--accent),var(--green))}
.score-num{font-family:'Playfair Display',serif;font-size:64px;font-weight:700;margin:8px 0 4px}
.score-bar-wrap{max-width:350px;margin:12px auto 0;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.score-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--accent),var(--green));transition:width 1.5s}

.grid{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.metric{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;flex:1 1 200px;min-width:180px;position:relative;overflow:hidden}
.metric-top{position:absolute;top:0;left:0;right:0;height:2px}
.metric-val{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;line-height:1.1}
.metric-sub{font-size:12px;color:var(--muted);margin-top:6px}
.tag{display:inline-block;margin-top:8px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:0.04em}
.tag-g{background:#7ac4a022;color:var(--green)}.tag-y{background:#c9a87c22;color:var(--accent)}.tag-r{background:#c47a7a22;color:var(--red)}

.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;flex:1 1 300px;min-width:280px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{min-width:100px;font-size:12px;color:var(--text);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--red));transition:width 0.8s}
.bar-val{min-width:32px;font-size:13px;color:var(--accent);text-align:right;font-weight:600}

.timeline{display:flex;align-items:flex-end;gap:3px;height:80px;margin-top:10px}
.timeline-bar{flex:1;border-radius:3px 3px 0 0;transition:height 0.8s;min-width:8px;position:relative}
.timeline-labels{display:flex;gap:3px;margin-top:6px}
.timeline-labels span{flex:1;text-align:center;font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace}

.signals{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
.signals h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:14px}
.sig-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--muted);line-height:1.6;display:flex;gap:10px}
.sig-item:last-child{border-bottom:none}

.btn{padding:8px 22px;border:1px solid var(--border);background:transparent;color:var(--accent);border-radius:100px;cursor:pointer;font-size:11px;margin-top:10px;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;transition:all 0.3s}
.btn:hover{border-color:var(--accent);background:#c9a87c15}
.err{background:#c47a7a15;border:1px solid var(--red);border-radius:10px;padding:1.2rem;color:var(--red);font-size:13px;margin-bottom:1rem;line-height:1.6}
.err pre{margin-top:8px;font-size:11px;color:#c47a7a99;background:#000;padding:8px;border-radius:6px;overflow-x:auto}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.proxy-status{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px}
.proxy-status .ok{color:var(--green)}
.loading{text-align:center;padding:4rem;color:var(--muted);font-style:italic}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="mono label" style="color:var(--accent)">Live Mixpanel Dashboard</div>
    <h1>Does She Still Care?</h1>
    <p id="status"><span class="spinner"></span>Connecting to Mixpanel...</p>
    <button class="btn" onclick="fetchAll()">↻ Refresh</button>
    <div class="proxy-status" id="proxy-status"></div>
  </div>
  <div id="error"></div>
  <div id="content"><div class="loading">Loading...</div></div>
</div>

<script>
const U = "ClaudeDashboard.22171e.mp-service-account";
const S = "huet8nyrp33R19DvIYMACP2LDQYtVLX3";
const PID = "4508414";
const AUTH = btoa(U + ":" + S);

const PROXIES = [
  url => "https://corsproxy.io/?" + encodeURIComponent(url),
  url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  url => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
];

let workingProxy = null;
const proxyStatus = document.getElementById('proxy-status');

async function tryFetch(url, headers) {
  if (workingProxy !== null) {
    try {
      const r = await fetch(PROXIES[workingProxy](url), { headers });
      if (r.ok) return await r.json();
    } catch (e) { workingProxy = null; }
  }

  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const r = await fetch(PROXIES[i](url), { headers });
      if (r.ok) {
        const text = await r.text();
        try {
          const data = JSON.parse(text);
          workingProxy = i;
          proxyStatus.innerHTML = '<span class="ok">● Connected via proxy ' + (i + 1) + '</span>';
          return data;
        } catch (parseErr) {
          console.warn('Proxy ' + i + ' returned non-JSON:', text.substring(0, 100));
        }
      }
    } catch (e) {
      console.warn('Proxy ' + i + ' failed:', e.message);
    }
  }
  throw new Error("All CORS proxies failed. Mixpanel API requires HTTPS hosting.");
}

function d(n) {
  const t = new Date();
  const f = new Date(t - n * 864e5);
  return { from: f.toISOString().split("T")[0], to: t.toISOString().split("T")[0] };
}

async function seg(event, from, to, on) {
  const params = new URLSearchParams({
    project_id: PID,
    event: JSON.stringify(event),
    from_date: from,
    to_date: to,
    type: "general",
  });
  if (on) params.append("on", on);
  return await tryFetch("https://mixpanel.com/api/2.0/segmentation?" + params.toString(), { Authorization: "Basic " + AUTH });
}

function sumVals(data) {
  if (!data || !data.data || !data.data.values) return {};
  const result = {};
  for (const [key, dates] of Object.entries(data.data.values)) {
    result[key] = Object.values(dates).reduce((s, v) => s + (v || 0), 0);
  }
  return result;
}

function sumTotal(data, eventName) {
  if (!data || !data.data || !data.data.values || !data.data.values[eventName]) return 0;
  return Object.values(data.data.values[eventName]).reduce((s, v) => s + (v || 0), 0);
}

function getDailyData(data, eventName) {
  if (!data || !data.data || !data.data.values || !data.data.values[eventName]) return [];
  return Object.entries(data.data.values[eventName]).map(([date, val]) => ({
    label: date.split("-").slice(1).join("/"),
    value: val || 0,
  }));
}

async function fetchAll() {
  const el = document.getElementById("content");
  const errEl = document.getElementById("error");
  const statusEl = document.getElementById("status");
  errEl.innerHTML = "";
  statusEl.innerHTML = '<span class="spinner"></span>Pulling data from Mixpanel...';

  try {
    const { from, to } = d(30);
    const signals = [];
    let score = 0;

    async function safeQuery(event, on) {
      try { return await seg(event, from, to, on); }
      catch (e) { console.warn('Failed: ' + event, e.message); return null; }
    }

    statusEl.innerHTML = '<span class="spinner"></span>Fetching events...';

    const results = await Promise.all([
      safeQuery("Page View"),
      safeQuery("CTA Clicked"),
      safeQuery("Scroll Depth", 'properties["depth"]'),
      safeQuery("Section Viewed", 'properties["section"]'),
      safeQuery("Memory Card Clicked", 'properties["card_title"]'),
      safeQuery("Page View", 'properties["mp_hour"]'),
      safeQuery("Daily Note Revealed"),
      safeQuery("Countdown Viewed"),
      safeQuery("Page View", 'properties["$city"]'),
    ]);

    const [pvRaw, ctaRaw, scrollRaw, secRaw, memRaw, hourRaw, revealRaw, countRaw, cityRaw] = results;

    statusEl.innerHTML = '<span class="spinner"></span>Analyzing signals...';

    const daily = getDailyData(pvRaw, "Page View");
    const totalVisits = daily.reduce((s, d) => s + d.value, 0);
    const uniqueDays = daily.filter(d => d.value > 0).length;
    const ctaClicks = sumTotal(ctaRaw, "CTA Clicked");

    const scrollMap = sumVals(scrollRaw);
    const scrollArr = Object.entries(scrollMap).filter(([k]) => k !== "$overall").map(([k, v]) => ({ label: k, value: v })).sort((a, b) => parseInt(a.label) - parseInt(b.label));

    const secMap = sumVals(secRaw);
    const secArr = Object.entries(secMap).filter(([k]) => k !== "$overall").map(([k, v]) => ({ label: k, value: v })).sort((a, b) => b.value - a.value);

    const memMap = sumVals(memRaw);
    const memArr = Object.entries(memMap).filter(([k]) => k !== "$overall").map(([k, v]) => ({ label: k, value: v })).sort((a, b) => b.value - a.value);

    const hourMap = sumVals(hourRaw);
    const hourArr = Array.from({ length: 24 }, (_, i) => ({ label: String(i), value: hourMap[String(i)] || 0, hour: i }));

    const revealViews = sumTotal(revealRaw, "Daily Note Revealed");
    const countdownViews = sumTotal(countRaw, "Countdown Viewed");

    const cityMap = sumVals(cityRaw);
    const cityArr = Object.entries(cityMap).filter(([k]) => k !== "$overall" && k !== "undefined").map(([k, v]) => ({ label: k, value: v })).sort((a, b) => b.value - a.value);

    score += Math.min(totalVisits * 5, 25);
    if (totalVisits > 5) signals.push({ e: "🟢", t: totalVisits + " total visits — she keeps coming back" });
    else if (totalVisits > 1) signals.push({ e: "🟡", t: totalVisits + " visits — some interest building" });
    else signals.push({ e: "🔴", t: totalVisits + " visit(s) — early days" });

    if (uniqueDays >= 3) { score += 15; signals.push({ e: "🟢", t: "Visited on " + uniqueDays + " different days — this is part of her routine" }); }
    else if (uniqueDays > 1) signals.push({ e: "🟡", t: "Visited on " + uniqueDays + " days" });

    if (ctaClicks > 0) { score += 25; signals.push({ e: "🟢", t: 'CTA clicked ' + ctaClicks + 'x — "For you, always" — SHE CARES' }); }
    else signals.push({ e: "🟡", t: "CTA not clicked yet — waiting" });

    const maxScroll = scrollArr.length > 0 ? Math.max(...scrollArr.map(d => parseInt(d.label) || 0)) : 0;
    if (maxScroll >= 90) { score += 15; signals.push({ e: "🟢", t: "Scrolled to 90%+ — read everything including the CTA" }); }
    else if (maxScroll >= 50) { score += 8; signals.push({ e: "🟡", t: "Scrolled to " + maxScroll + "% — read most" }); }
    else if (maxScroll > 0) signals.push({ e: "🔴", t: "Only scrolled to " + maxScroll + "%" });

    if (secArr.some(s => s.label.toLowerCase().includes("poem"))) { score += 10; signals.push({ e: "🟢", t: "She saw your poem — your words reached her" }); }
    if (secArr.some(s => s.label.toLowerCase().includes("question"))) signals.push({ e: "🟢", t: 'She read "Do you still think about it?"' });

    if (memArr.length > 0) { score += 5; signals.push({ e: "🟢", t: "Explored " + memArr.length + " memory card(s): " + memArr.map(m => m.label).join(", ") }); }

    const lateNight = hourArr.filter(h => h.hour >= 22 || h.hour <= 4).reduce((s, h) => s + h.value, 0);
    if (lateNight > 0) { score += 10; signals.push({ e: "🟢", t: lateNight + " late-night visit(s) (10 PM–4 AM) — emotional, not casual" }); }

    if (countdownViews > 0) { score += 10; signals.push({ e: "🟢", t: countdownViews + " pre-11 AM view(s) — she's ANTICIPATING your daily word" }); }
    if (revealViews > 0) signals.push({ e: "🟢", t: revealViews + " daily word reveal(s)" });

    if (cityArr.length > 0) signals.push({ e: "🗺️", t: "Cities: " + cityArr.slice(0, 5).map(c => c.label + " (" + c.value + ")").join(", ") });

    score = Math.min(score, 100);
    let verdict, vColor;
    if (score >= 75) { verdict = "She definitely still cares."; vColor = "var(--green)"; }
    else if (score >= 50) { verdict = "There's something there. She's curious."; vColor = "var(--accent)"; }
    else if (score >= 25) { verdict = "Mild interest — early days."; vColor = "var(--accent)"; }
    else { verdict = "Not enough data yet."; vColor = "var(--muted)"; }

    function bars(data, title, max) {
      if (!data || data.length === 0) return '<div class="mono label">' + title + '</div><div style="color:var(--muted);font-style:italic;padding:2rem 0;text-align:center;font-size:13px">No data yet</div>';
      const m = Math.max(...data.map(d => d.value), 1);
      return '<div class="mono label">' + title + '</div>' + data.slice(0, max || 12).map(d =>
        '<div class="bar-row"><div class="bar-label mono">' + d.label + '</div><div class="bar-track"><div class="bar-fill" style="width:' + ((d.value / m) * 100) + '%"></div></div><div class="bar-val mono">' + d.value + '</div></div>'
      ).join('');
    }

    function timeline(data, title) {
      if (!data || data.length === 0) return '<div class="mono label">' + title + '</div><div style="color:var(--muted);font-style:italic;padding:2rem 0;text-align:center;font-size:13px">No data yet</div>';
      const m = Math.max(...data.map(d => d.value), 1);
      return '<div class="mono label">' + title + '</div><div class="timeline">' +
        data.map(d => '<div class="timeline-bar" title="' + d.label + ': ' + d.value + ' visits" style="height:' + Math.max((d.value / m) * 80, 2) + 'px;background:' + (d.value > 0 ? 'linear-gradient(180deg,var(--accent),var(--red))' : 'var(--border)') + '"></div>').join('') +
        '</div><div class="timeline-labels">' + data.map(d => '<span>' + d.label + '</span>').join('') + '</div>';
    }

    el.innerHTML =
      '<div class="score-card">' +
        '<div class="mono label">Care Score</div>' +
        '<div class="score-num" style="color:' + vColor + '">' + score + '<span style="font-size:24px;color:var(--muted)">/100</span></div>' +
        '<div style="font-size:18px;color:var(--muted);font-style:italic">' + verdict + '</div>' +
        '<div class="score-bar-wrap"><div class="score-bar" style="width:' + score + '%"></div></div>' +
      '</div>' +

      '<div class="grid">' +
        '<div class="metric"><div class="metric-top" style="background:var(--accent)"></div><div class="mono label">Total Visits</div><div class="metric-val">' + totalVisits + '</div><div class="metric-sub">' + uniqueDays + ' unique days</div><div class="tag mono ' + (totalVisits > 5 ? 'tag-g' : totalVisits > 1 ? 'tag-y' : 'tag-r') + '">' + (totalVisits > 5 ? 'STRONG' : totalVisits > 1 ? 'MODERATE' : 'LOW') + '</div></div>' +
        '<div class="metric"><div class="metric-top" style="background:' + (ctaClicks > 0 ? 'var(--green)' : 'var(--border)') + '"></div><div class="mono label">CTA Clicks</div><div class="metric-val">' + ctaClicks + '</div><div class="metric-sub">"For you, always"</div><div class="tag mono ' + (ctaClicks > 0 ? 'tag-g' : 'tag-y') + '">' + (ctaClicks > 0 ? 'SHE CARES' : 'WAITING') + '</div></div>' +
        '<div class="metric"><div class="metric-top" style="background:var(--red)"></div><div class="mono label">Daily Word</div><div class="metric-val">' + (revealViews + countdownViews) + '</div><div class="metric-sub">' + countdownViews + ' before 11 AM</div><div class="tag mono ' + (countdownViews > 0 ? 'tag-g' : revealViews > 0 ? 'tag-y' : 'tag-r') + '">' + (countdownViews > 0 ? 'ANTICIPATING' : revealViews > 0 ? 'CHECKING' : 'NONE') + '</div></div>' +
        '<div class="metric"><div class="metric-top" style="background:' + (lateNight > 0 ? 'var(--green)' : 'var(--border)') + '"></div><div class="mono label">Late Night</div><div class="metric-val">' + lateNight + '</div><div class="metric-sub">10 PM – 4 AM visits</div><div class="tag mono ' + (lateNight > 0 ? 'tag-g' : 'tag-y') + '">' + (lateNight > 0 ? 'EMOTIONAL' : '—') + '</div></div>' +
      '</div>' +

      '<div class="grid">' +
        '<div class="chart-card">' + timeline(daily, "Visits per day (30 days)") + '</div>' +
        '<div class="chart-card">' + bars(hourArr.filter(h => h.value > 0).map(h => ({ label: h.label + "h", value: h.value })), "Visit hour of day", 24) + '</div>' +
      '</div>' +

      '<div class="grid">' +
        '<div class="chart-card">' + bars(secArr, "Sections viewed") + '</div>' +
        '<div class="chart-card">' + bars(scrollArr.map(s => ({ label: s.label + "%", value: s.value })), "Scroll depth") + '</div>' +
      '</div>' +

      '<div class="grid">' +
        '<div class="chart-card">' + bars(memArr, "Memory cards clicked") + '</div>' +
        '<div class="chart-card">' + bars(cityArr, "Visits by city") + '</div>' +
      '</div>' +

      '<div class="signals"><h2>Behavioral Signals</h2>' +
        signals.map(s => '<div class="sig-item"><span style="font-size:16px;flex-shrink:0">' + s.e + '</span><span>' + s.t + '</span></div>').join('') +
      '</div>' +

      '<div class="signals"><h2>How to read this</h2>' +
        '<div class="sig-item">Score above <strong style="color:var(--text)">75</strong> = she definitely still cares</div>' +
        '<div class="sig-item"><strong style="color:var(--text)">Return visits on different days</strong> = the #1 signal</div>' +
        '<div class="sig-item"><strong style="color:var(--text)">Late-night visits</strong> (10 PM – 4 AM) = emotional, not casual</div>' +
        '<div class="sig-item"><strong style="color:var(--text)">Countdown views</strong> (before 11 AM) = anticipation</div>' +
        '<div class="sig-item"><strong style="color:var(--text)">CTA clicked</strong> = strongest signal — she chose to respond</div>' +
      '</div>';

    statusEl.textContent = "Updated: " + new Date().toLocaleString();
  } catch (e) {
    errEl.innerHTML = '<div class="err"><strong>Connection failed:</strong> ' + e.message + '<br><br><strong>Most likely fix:</strong> Open this file from an https:// URL, not as a local file.<br><br>Quick fix — host on your existing GitHub Pages:<br>1. Upload <code>care-dashboard.html</code> to the same repo as your site<br>2. Visit <code>https://your-site.github.io/care-dashboard.html</code><br><br>Or run locally:<pre>cd folder && python3 -m http.server 8000</pre>then open <code>http://localhost:8000/care-dashboard.html</code></div>';
    statusEl.textContent = "Error — see details above";
    console.error(e);
  }
}

fetchAll();
</script>
</body>
</html>
